    # 环境变量（覆盖Dockerfile中的JAVA_OPTS，可选）
    environment:
      - TZ=Asia/Shanghai
      # - NFT_TURBO_SENTINEL_URL=192.168.8.5:8099
      # - NFT_TURBO_NACOS_SERVER_URL=192.168.8.5:8848
      - HOST_IP=192.168.8.5
    deploy:
      resources:
